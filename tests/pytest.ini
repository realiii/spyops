[pytest]
addopts = --strict-markers -m "not (large or slow or benchmark)"
markers =
    benchmark: Benchmark Tests
    slow: Slow Tests
    crs: Coordinate Reference System Tests
    database: Database Tests
    element: Element Tests
    environment: Environment / Analysis Settings Tests
    extract: Extract Operations
    features: Features Tests
    field: Field Tests
    geometry: Geometry Tests
    large: Large number of parameters
    overlay: Overlay Tests
    query: Query Tests
    utility: Utility Tests
    validation: Validation Tests
    zm: ZM tests
